#cloud-config
autoinstall:
  version: 1

  identity:
    hostname: lsc-pc
    username: lsc-admin
    password: "$6$rounds=4096$LSC$zY6L9K9Qm7V8l3xYwJX1vY7G8OeW7g3m0yQ8v7mJc3H5pQxv9GzYk2w0G2Jm9X1r8y8GQ5KcZ7W1JqZxKk7gA0"

  locale: de_DE.UTF-8
  keyboard:
    layout: de

  timezone: Europe/Berlin

  ssh:
    install-server: true

  storage:
    layout:
      name: lvm

  # Keine Snaps (außer was Ubuntu intern zwingt)
  snaps: []

  packages:
    - vim
    - wget

  late-commands:
    # Desktop installieren
    - curtin in-target -- apt update
    - curtin in-target -- apt install -y ubuntu-desktop

    # Google Chrome installieren (offizielles Paket)
    - curtin in-target -- wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    - curtin in-target -- apt install -y ./google-chrome-stable_current_amd64.deb

    # Zweiten Benutzer anlegen
    - curtin in-target -- useradd -m -s /bin/bash lsc-mitglied
    - curtin in-target -- bash -c "echo 'lsc-mitglied:mitglied-lsc' | chpasswd"

    # Anzeigenamen setzen
    - curtin in-target -- usermod -c "LSC Mitglied" lsc-mitglied
    - curtin in-target -- usermod -c "LSC Admin" lsc-admin

    # Adminrechte
    - curtin in-target -- usermod -aG sudo lsc-admin

    # Autologin für Vereinsnutzer
    - curtin in-target -- mkdir -p /etc/gdm3
    - curtin in-target -- bash -c 'echo "[daemon]" > /etc/gdm3/custom.conf'
    - curtin in-target -- bash -c 'echo "AutomaticLoginEnable=true" >> /etc/gdm3/custom.conf'
    - curtin in-target -- bash -c 'echo "AutomaticLogin=lsc-mitglied" >> /etc/gdm3/custom.conf'

    # System aktualisieren
    - curtin in-target -- apt upgrade -y
